version: "3.8"
services:
  books-service-postgresql:
    image: postgres
    container_name: books-service-postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: docker_usr
      POSTGRES_PASSWORD: docker_pwd
      POSTGRES_DB: books_service
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U docker_usr -d books_service" ]
      interval: 5s
      timeout: 5s
      retries: 5
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev
    ports:
      - "8082:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_pwd
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://books-service-postgresql:5432/books_service
      KC_DB_USERNAME: docker_usr
      KC_DB_PASSWORD: docker_pwd
    depends_on:
      books-service-postgresql:
        condition: service_healthy
    restart: unless-stopped
  books-catalog-application:
    build: .
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://books-service-postgresql:5432/books_service
    depends_on:
      books-service-postgresql:
        condition: service_healthy
