syntax = "proto3";
import "author.proto";
package books_grpc;
import "google/protobuf/empty.proto";

option java_multiple_files = true;
option java_package = "com.wesleyserrano.books_catalog_service.proto";
option java_outer_classname = "BookCatalogProto";

service BookGrpcService {
    rpc requestBookById(BookSearch) returns (BookGrpc) {}
    rpc requestBooks(google.protobuf.Empty) returns (ListBookGrpc) {}
    rpc addBook(AddBookGrpc) returns (BookGrpc) {}
}

message BookGrpc {
    string id = 1;
    string name = 2;
    author_grpc.AuthorGrpc author = 3;
    int64 pageCount = 4;
}

message BookSearch {
    string id = 1;
}

message ListBookGrpc {
   repeated BookGrpc books = 1;
}


message AddBookGrpc {
    string name = 1;
    int64 pageCount = 2;
    string authorId = 3;
}